name: Deploy Jekyll with GitHub Pages dependencies preinstalled

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Build frontend (detect Vite / CRA, produce relative assets)
        run: |
          if grep -qi '"vite"' package.json; then
            echo "Detected Vite - building with relative base ./"
            npm run build -- --base ./
          elif grep -qi '"react-scripts"' package.json || grep -qi '"react-scripts"' package-lock.json; then
            echo "Detected CRA - building with PUBLIC_URL=./"
            PUBLIC_URL=./ npm run build
          else
            echo "Unknown toolchain - running default build"
            npm run build
          fi

      - name: Show build output for debugging
        run: |
          echo "Listing project root:"
          ls -la
          echo "Listing build outputs (dist / build):"
          if [ -d "./dist" ]; then ls -la ./dist; elif [ -d "./build" ]; then ls -la ./build; else echo "No dist/build dir"; fi
          echo "Preview index.html if exists:"
          if [ -f "./dist/index.html" ]; then head -n 120 ./dist/index.html; elif [ -f "./build/index.html" ]; then head -n 120 ./build/index.html; else echo "No index.html found in dist/build"; fi

      - name: Copy build output into _site (preserve hidden files)
        run: |
          mkdir -p ./_site
          if [ -d "./dist" ]; then
            # copy all files including dotfiles; use trailing dot to copy contents
            cp -a ./dist/. ./_site/
          elif [ -d "./build" ]; then
            cp -a ./build/. ./_site/
          else
            echo "No build output found" && exit 1
          fi
          echo "Contents of _site:"
          ls -la ./_site | sed -n '1,200p'

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
